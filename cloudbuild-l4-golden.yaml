# ─── Brasil AI Avatar — Cloud Build: L4 Golden Image ────────────────────
# Builder: builda a imagem golden UMA VEZ e congela.
# Fonte: LatentSync via git submodule (todas deps declaradas).
# Uso: gcloud builds submit --config=cloudbuild-l4-golden.yaml --region=us-east1

steps:
  # 0. Criar diretório de destino (necessário para gsutil -m cp -r)
  - name: 'bash'
    args: ['-c', 'mkdir -p /workspace/infra/models/insightface']

  # 1. Baixar modelos InsightFace do GCS (versionados no bucket)
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: 'gsutil'
    args:
      - '-m'
      - 'cp'
      - '-r'
      - 'gs://lana-weights-universal/checkpoints/auxiliary/models/buffalo_l'
      - '/workspace/infra/models/insightface/'

  # 2. Build da imagem Docker
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '-t'
      - 'us-east1-docker.pkg.dev/brasili-ia-news/lana-repo/avatar-l4:v2.10-golden'
      - '-f'
      - 'infra/docker/Dockerfile.avatar-l4-v2.10-golden'
      - '.'

  # 3. Push da imagem para Artifact Registry
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - 'us-east1-docker.pkg.dev/brasili-ia-news/lana-repo/avatar-l4:v2.10-golden'

images:
  - 'us-east1-docker.pkg.dev/brasili-ia-news/lana-repo/avatar-l4:v2.10-golden'

options:
  logging: CLOUD_LOGGING_ONLY
  machineType: 'E2_HIGHCPU_8'
