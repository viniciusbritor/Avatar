# ─── Brasil AI Avatar — Cloud Build: API Only ────────────────────────────
# Disparar quando: mudou código da API (api/*, src/*), entrypoint, ou deps da API.
# Tempo estimado: ~3 min (imagem Python slim, sem CUDA)

steps:
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '-t'
      - 'us-east1-docker.pkg.dev/brasili-ia-news/lana-repo/avatar-api:latest'
      - '-f'
      - 'api/Dockerfile'
      - '.'

  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - 'us-east1-docker.pkg.dev/brasili-ia-news/lana-repo/avatar-api:latest'

  - name: 'gcr.io/cloud-builders/gcloud'
    args:
      - 'run'
      - 'deploy'
      - 'avatar-api'
      - '--image=us-east1-docker.pkg.dev/brasili-ia-news/lana-repo/avatar-api:latest'
      - '--project=brasili-ia-news'
      - '--region=us-east1'
      - '--service-account=avatar-api-sa@brasili-ia-news.iam.gserviceaccount.com'
      - '--set-env-vars=API_SECRET_KEY=brasilai-avatar-2026,STARTUP_SCRIPT_PATH=/app/infra/startup_arch4.sh'
      - '--set-secrets=ELEVEN_LABS_API_KEY=ELEVEN_LABS_API_KEY:latest'
      - '--timeout=3600'
      - '--memory=2Gi'
      - '--cpu=2'
      - '--allow-unauthenticated'
      - '--quiet'

images:
  - 'us-east1-docker.pkg.dev/brasili-ia-news/lana-repo/avatar-api:latest'

options:
  logging: CLOUD_LOGGING_ONLY
