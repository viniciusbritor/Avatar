# ─── Brasil AI Avatar — Cloud Build: API Only (v3.2.0 — VM e2-micro) ─────
# Apenas build e push da imagem. O deploy é manual na VM e2-micro.
# Tempo estimado: ~3 min.

steps:
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '-t'
      - 'us-east1-docker.pkg.dev/brasili-ia-news/lana-repo/avatar-api:latest'
      - '-f'
      - 'api/Dockerfile'
      - '.'

  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - 'us-east1-docker.pkg.dev/brasili-ia-news/lana-repo/avatar-api:latest'

images:
  - 'us-east1-docker.pkg.dev/brasili-ia-news/lana-repo/avatar-api:latest'

options:
  logging: CLOUD_LOGGING_ONLY
