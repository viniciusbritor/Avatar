steps:
  # 1. Build da Imagem da API
  - name: 'gcr.io/cloud-builders/docker'
    args: ['build', '-t', 'us-east1-docker.pkg.dev/brasili-ia-news/lana-repo/avatar-api:v3.1.6', '-f', 'api/Dockerfile', '.']

  # 2. Push da Imagem
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'us-east1-docker.pkg.dev/brasili-ia-news/lana-repo/avatar-api:v3.1.6']

  # 3. Deploy no Cloud Run
  - name: 'gcr.io/cloud-builders/gcloud'
    args:
      - 'run'
      - 'deploy'
      - 'avatar-api'
      - '--image=us-east1-docker.pkg.dev/brasili-ia-news/lana-repo/avatar-api:v3.1.6'
      - '--project=brasili-ia-news'
      - '--region=us-east1'
      - '--service-account=avatar-api-sa@brasili-ia-news.iam.gserviceaccount.com'
      - '--set-env-vars=API_SECRET_KEY=brasilai-avatar-2026,STARTUP_SCRIPT_PATH=/app/infra/startup_arch4.sh,GCS_BUCKET=brasil-ai-avatars-vault,GCS_DB_BLOB=brasil_ai.db'
      - '--set-secrets=ELEVEN_LABS_API_KEY=ELEVEN_LABS_API_KEY:latest,DID_BASIC_AUTH=DID_BASIC_AUTH:latest'
      - '--timeout=3600'
      - '--memory=2Gi'
      - '--cpu=2'
      - '--allow-unauthenticated'
      - '--quiet'
