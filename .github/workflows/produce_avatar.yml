name: 🎬 Avatar Production Pipeline

on:
  workflow_dispatch:
    inputs:
      text:
        description: 'Texto para o avatar falar'
        required: true
        type: string
      job_id:
        description: 'ID do job para rastreamento'
        required: false
        type: string
        default: 'manual'

jobs:
  produce-avatar:
    name: Produzir Avatar
    runs-on: ubuntu-latest
    timeout-minutes: 90

    steps:
      - name: Checkout do repositório
        uses: actions/checkout@v4
        with:
          ref: master

      - name: Autenticar no GCP (Workload Identity Federation)
        uses: google-github-actions/auth@v2
        with:
          project_id: brasili-ia-news
          workload_identity_provider: 'projects/180096224219/locations/global/workloadIdentityPools/github-actions-pool/providers/github-provider'
          service_account: 'github-actions-sa@brasili-ia-news.iam.gserviceaccount.com'

      - name: Configurar gcloud CLI
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: brasili-ia-news

      - name: Configurar Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Instalar dependências (Runner Mode)
        run: |
          python -m pip install --upgrade pip
          pip install agno google-genai google-cloud-storage google-cloud-compute requests python-dotenv

      - name: Fetch Secrets from GCP
        run: |
          GEMINI_KEY=$(gcloud secrets versions access latest --secret="GEMINI_API_KEY")
          echo "::add-mask::$GEMINI_KEY"
          echo "GEMINI_API_KEY=$GEMINI_KEY" >> $GITHUB_ENV
          echo "GOOGLE_API_KEY=$GEMINI_KEY" >> $GITHUB_ENV

      - name: Produzir Avatar
        env:
          ENVIRONMENT: cloud
          AVATAR_TEXT: ${{ inputs.text }}
          JOB_ID: ${{ inputs.job_id }}
          GCS_BUCKET: brasil-ai-avatars-vault
          PYTHONPATH: .
        run: |
          echo "🎬 Iniciando produção do Avatar"
          echo "📝 Texto: $AVATAR_TEXT"
          echo "🆔 Job ID: $JOB_ID"
          python src/produce_requested_videos.py --text "$AVATAR_TEXT" --job-id "$JOB_ID"

      - name: Upload resultado para GCS
        if: always()
        run: |
          if ls outputs/*.mp4 2>/dev/null; then
            TIMESTAMP=$(date +%Y%m%d_%H%M%S)
            for f in outputs/*.mp4; do
              NEW_NAME="outputs/${JOB_ID}_${TIMESTAMP}.mp4"
              mv "$f" "$NEW_NAME"
              echo "🚀 Renomeado: $f -> $NEW_NAME"
            done
            gsutil -m cp outputs/*.mp4 gs://brasil-ai-avatars-vault/outputs/
            echo "✅ Vídeo enviado para gs://brasil-ai-avatars-vault/outputs/"
          else
            echo "⚠️ Nenhum vídeo encontrado em outputs/"
          fi
