name: CI/CD - API (e2-micro)

permissions:
  id-token: write
  contents: read

on:
  push:
    branches: [master]
    paths:
      - 'api/**'
      - 'src/**'
      - 'infra/boot/**'
      - 'infra/services/**'
      - 'infra/docker/**'
      - 'infra/reference/**'
      - 'cloudbuild-api.yaml'
      - '.github/workflows/ci-cd-api.yml'
  workflow_dispatch:

jobs:
  build-and-push:
    name: Build & Push API Image
    runs-on: ubuntu-22.04
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Authenticate to GCP (Workload Identity Federation)
        uses: google-github-actions/auth@v2
        with:
          project_id: brasili-ia-news
          workload_identity_provider: 'projects/180096224219/locations/global/workloadIdentityPools/github-actions-pool/providers/github-provider'
          service_account: 'github-actions-sa@brasili-ia-news.iam.gserviceaccount.com'

      - name: Setup gcloud
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: brasili-ia-news

      - name: Cloud Build (API)
        run: |
          gcloud auth list
          gcloud builds submit \
            --config=cloudbuild-api.yaml \
            --region=us-east1 \
            --project=brasili-ia-news \
            --gcs-source-staging-dir=gs://brasil-ai-avatars-vault/cloudbuild-source/api \
            .

      - name: Smoke test (valida imagem)
        run: |
          gcloud auth configure-docker us-east1-docker.pkg.dev --quiet
          IMAGE="us-east1-docker.pkg.dev/brasili-ia-news/lana-repo/avatar-api:latest"
          docker pull "$IMAGE"
          docker run --rm -d --name lana-smoke -p 8080:8080 \
            -e API_SECRET_KEY=test "$IMAGE"
          for i in $(seq 1 10); do
            if curl -sf --max-time 3 http://localhost:8080/health; then
              echo "=== SMOKE TEST: OK ==="
              docker stop lana-smoke
              exit 0
            fi
            sleep 3
          done
          echo "=== SMOKE TEST: FAILED ==="
          docker logs lana-smoke
          exit 1

      - name: Build Concluida
        run: |
          echo "Imagem avatar-api:latest publicada no Artifact Registry."
          echo "Para atualizar a VM execute manualmente:"
          echo "  gcloud compute ssh lana-api --zone=us-east1-c --tunnel-through-iap"
          echo "  sudo lana-update.sh"
          echo ""
          echo "Verificando se API esta saudavel..."
          if curl -sf --max-time 10 http://35.231.46.76:8080/health; then
            echo "API: OK"
          else
            echo "API: UNREACHABLE — verifique a VM!"
          fi
