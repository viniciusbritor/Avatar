name: CI/CD - API (e2-micro)

permissions:
  id-token: write
  contents: read

on:
  push:
    branches: [master]
    paths:
      - 'api/**'
      - 'src/**'
      - 'infra/boot/**'
      - 'infra/services/**'
      - 'infra/docker/**'
      - 'infra/reference/**'
      - 'cloudbuild-api.yaml'
      - '.github/workflows/ci-cd-api.yml'
  workflow_dispatch:

jobs:
  build-and-push:
    name: Build & Push API Image
    runs-on: ubuntu-22.04
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Authenticate to GCP (Workload Identity Federation)
        uses: google-github-actions/auth@v2
        with:
          project_id: brasili-ia-news
          workload_identity_provider: 'projects/180096224219/locations/global/workloadIdentityPools/github-actions-pool/providers/github-provider'
          service_account: 'github-actions-sa@brasili-ia-news.iam.gserviceaccount.com'

      - name: Setup gcloud
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: brasili-ia-news

      - name: Cloud Build (API)
        run: |
          gcloud auth list
          gcloud builds submit \
            --config=cloudbuild-api.yaml \
            --region=us-east1 \
            --project=brasili-ia-news \
            --gcs-source-staging-dir=gs://brasil-ai-avatars-vault/cloudbuild-source/api \
            .

      - name: Notify VM to update
        run: |
          echo "$(date -u +%Y-%m-%dT%H:%M:%SZ)" | gsutil cp - gs://brasil-ai-avatars-vault/triggers/lana-api-update.txt
          echo "Trigger written. VM will pull and restart within 1 minute."
