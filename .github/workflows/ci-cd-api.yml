name: CI/CD - API (e2-micro)

on:
  push:
    branches: [master]
    paths:
      - 'api/**'
      - 'src/**'
      - 'infra/boot/**'
      - 'infra/services/**'
      - 'infra/docker/**'
      - 'infra/reference/**'
      - 'cloudbuild-api.yaml'
      - '.github/workflows/ci-cd-api.yml'
  workflow_dispatch:

jobs:
  build-and-push:
    name: Build & Push API Image
    runs-on: ubuntu-22.04
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup gcloud
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: brasili-ia-news

      - name: Auth GCP
        env:
          GCP_SA_KEY: ${{ secrets.GCP_SA_KEY }}
        run: |
          echo "$GCP_SA_KEY" > /tmp/gcp-sa.json
          gcloud auth activate-service-account --key-file=/tmp/gcp-sa.json
          rm /tmp/gcp-sa.json

      - name: Cloud Build (API)
        run: |
          gcloud auth list
          gcloud builds submit \
            --account=avatar-api-sa@brasili-ia-news.iam.gserviceaccount.com \
            --config=cloudbuild-api.yaml \
            --region=us-east1 \
            --project=brasili-ia-news \
            .
