name: CI/CD - L4 Golden Image

on:
  push:
    branches: [master]
    paths:
      - 'latentsync'
      - 'latentsync/**'
      - 'infra/docker/Dockerfile.avatar-l4-v2.10-golden'
      - 'infra/reference/requirements-l4.txt'
      - 'src/**'
      - 'cloudbuild-l4-golden.yaml'
      - '.github/workflows/ci-cd-l4.yml'
  workflow_dispatch:

jobs:
  build-and-push:
    name: Build & Push L4 Golden Image
    runs-on: ubuntu-22.04
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Auth GCP
        uses: google-github-actions/auth@v2
        with:
          credentials_json: '${{ secrets.GCP_SA_KEY }}'

      - name: Setup gcloud
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: brasili-ia-news

      - name: Cloud Build (L4 Golden)
        run: |
          gcloud builds submit \
            --config=cloudbuild-l4-golden.yaml \
            --region=us-east1 \
            --project=brasili-ia-news \
            .
