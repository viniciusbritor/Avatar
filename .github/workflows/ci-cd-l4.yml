name: CI/CD - L4 Golden Image

permissions:
  id-token: write
  contents: read

on:
  push:
    branches: [master]
    paths:
      - 'latentsync'
      - 'latentsync/**'
      - 'infra/docker/Dockerfile.avatar-l4-v2.10'
      - 'infra/docker/Dockerfile.avatar-l4-v2.10-golden'
      - 'infra/reference/requirements-l4.txt'
      - 'src/**'
      - 'cloudbuild-l4.yaml'
      - 'cloudbuild-l4-golden.yaml'
      - '.github/workflows/ci-cd-l4.yml'
  workflow_dispatch:

jobs:
  build-and-push:
    name: Build & Push L4 Golden Image
    runs-on: ubuntu-22.04
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Authenticate to GCP (Workload Identity Federation)
        uses: google-github-actions/auth@v2
        with:
          project_id: brasili-ia-news
          workload_identity_provider: 'projects/180096224219/locations/global/workloadIdentityPools/github-actions-pool/providers/github-provider'
          service_account: 'github-actions-sa@brasili-ia-news.iam.gserviceaccount.com'

      - name: Setup gcloud
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: brasili-ia-news

      - name: Cloud Build (L4 Golden)
        run: |
          gcloud auth list
          gcloud builds submit \
            --config=cloudbuild-l4-golden.yaml \
            --region=us-east1 \
            --project=brasili-ia-news \
            --async \
            --gcs-source-staging-dir=gs://brasil-ai-avatars-vault/cloudbuild-source/l4 \
            .

      - name: Cloud Build (L4 v2.10 - Deps Only)
        run: |
          gcloud builds submit \
            --config=cloudbuild-l4.yaml \
            --region=us-east1 \
            --project=brasili-ia-news \
            --async \
            --gcs-source-staging-dir=gs://brasil-ai-avatars-vault/cloudbuild-source/l4 \
            .
