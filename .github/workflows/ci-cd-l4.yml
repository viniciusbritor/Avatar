name: CI/CD - L4 Golden Image

on:
  push:
    branches: [master]
    paths:
      - 'latentsync'
      - 'latentsync/**'
      - 'infra/docker/Dockerfile.avatar-l4-v2.10-golden'
      - 'infra/reference/requirements-l4.txt'
      - 'src/**'
      - 'cloudbuild-l4-golden.yaml'
      - '.github/workflows/ci-cd-l4.yml'
  workflow_dispatch:

jobs:
  build-and-push:
    name: Build & Push L4 Golden Image
    runs-on: ubuntu-22.04
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup gcloud
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: brasili-ia-news

      - name: Auth GCP
        env:
          GCP_SA_KEY: ${{ secrets.GCP_SA_KEY }}
        run: |
          echo "$GCP_SA_KEY" > /tmp/gcp-sa.json
          gcloud auth activate-service-account --key-file=/tmp/gcp-sa.json
          rm /tmp/gcp-sa.json

      - name: Cloud Build (L4 Golden)
        run: |
          gcloud auth list
          echo "--- Testing builds.list ---"
          gcloud builds list --project=brasili-ia-news --region=us-east1 --limit=1
          echo "--- Testing builds.submit with --no-source ---"
          gcloud builds submit --no-source --config=cloudbuild-l4-golden.yaml --region=us-east1 --project=brasili-ia-news --async
          echo "--- If we got here, SA has Cloud Build API access ---"
          echo "--- Trying full submit ---"
          gcloud builds submit \
            --account=avatar-api-sa@brasili-ia-news.iam.gserviceaccount.com \
            --config=cloudbuild-l4-golden.yaml \
            --region=us-east1 \
            --project=brasili-ia-news \
            .
